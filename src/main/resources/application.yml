management:
  endpoint:
    enabled-by-default: true
  endpoints:
    web:
      exposure:
        include: "*"

app:
  autoresolve-parent-tasks: false
  kafka:
    begin-consumer-group: orchestration-async-jobs-begin
    result-consumer-group: orchestration-async-jobs-result

spring:
  application:
    name: orchestration-async-jobs-crud
  datasource:
    url: jdbc:postgresql://localhost:5432/joposcragent
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: orchestration-async-jobs
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8085

# Uncomment for verbose service logs (REST + Kafka payloads):
